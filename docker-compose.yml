services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: locative_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - locative_network
    expose:
      - "5432"

  web:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/locative_db
    networks:
      - locative_network

networks:
  locative_network:
    driver: bridge

volumes:
  postgres_data:
