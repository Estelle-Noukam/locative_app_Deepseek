<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Espace Locataire</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body><nav class="navbar navbar-dark bg-primary"><div class="container"><a class="navbar-brand" href="#">Gestion Locative - Locataire</a><div><a class="nav-link text-white" href="/profile">Profil</a><a class="nav-link text-white" href="/logout">Déconnexion</a></div></div></nav>
<div class="container mt-4"><h2>Espace Locataire</h2><div class="alert alert-info">Recherchez des logements, faites des demandes et suivez vos paiements.</div>
<div class="row"><div class="col-md-6"><div class="card"><div class="card-header">Logements disponibles</div><div class="card-body" id="available-properties">Chargement...</div></div></div>
<div class="col-md-6"><div class="card"><div class="card-header">Mes paiements</div><div class="card-body" id="my-payments">Chargement...</div></div></div></div></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script><script>
$.get('/api/properties', function(data) { let html='<ul class="list-group">'; data.forEach(p=>{html+=`<li class="list-group-item">${p.title} - ${p.rent_amount}€ <button class="btn btn-sm btn-success" onclick="requestRental(${p.id})">Demander</button></li>`}); html+='</ul>'; $('#available-properties').html(html); });
$.get('/api/payments', function(data) { let html='<ul class="list-group">'; data.forEach(p=>{html+=`<li class="list-group-item">${p.amount}€ - ${p.status} - échéance ${p.due_date}</li>`}); html+='</ul>'; $('#my-payments').html(html); });
function requestRental(propertyId) { $.post('/api/rental-requests', JSON.stringify({property_id:propertyId, message:"Je souhaite louer ce bien"}), function() { alert('Demande envoyée'); }).fail(()=>alert('Erreur')); }
</script></body></html>
